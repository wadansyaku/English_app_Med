
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F66D0B" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Steady Study">
    <title>Steady Study | 英単語学習スペース</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              medace: {
                50: '#fffaf3',
                100: '#fff1df',
                200: '#fcd797',
                300: '#ffbf52',
                400: '#f66d0b',
                500: '#fd6209',
                600: '#e45e04',
                700: '#c85208',
                800: '#66321A',
                900: '#2F1609',
              }
            },
            fontFamily: {
              sans: ['"Space Grotesk"', '"Noto Sans JP"', 'system-ui', 'sans-serif'],
            },
            animation: {
                'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
                'tilt': 'tilt 10s infinite linear',
            },
            keyframes: {
                tilt: {
                    '0%, 50%, 100%': { transform: 'rotate(0deg)' },
                    '25%': { transform: 'rotate(0.5deg)' },
                    '75%': { transform: 'rotate(-0.5deg)' },
                }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at top, rgba(246, 109, 11, 0.14), transparent 26%),
          radial-gradient(circle at 18% 0%, rgba(255, 191, 82, 0.18), transparent 18%),
          linear-gradient(180deg, #fffdf9 0%, #fff6ea 42%, #ffffff 100%);
        overscroll-behavior-y: none;
        color: #2f1609;
      }
      .card-flip {
        perspective: 1000px;
      }
      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s;
        transform-style: preserve-3d;
      }
      .card-flip.flipped .card-inner {
        transform: rotateY(180deg);
      }
      .card-front, .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
      }
      .card-back {
        transform: rotateY(180deg);
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>
    <script type="module" src="/index.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
